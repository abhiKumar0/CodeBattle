spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      url: ${REDIS_URL}

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USER}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  config:
    import: optional:file:.env[.properties]

server:
  port: 8080

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

judge0:
  url: http://localhost:2358
  api-key: ${JUDGE0_API_KEY}

jdoodle:
  client-id: ${JDOODLE_CLIENT_ID}
  client-secret: ${JDOODLE_CLIENT_SECRET}
#  client-id: "1223"
#  client-secret: "asjsbd"


jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000